name: Auto Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~

            if [ ! -d "render/.git" ]; then
              echo "Cloning repo via SSH..."
              rm -rf render
              git clone git@github.com:MWahhabMirzaVectorLabsFZELLC/renderNodes.git render
            else
              cd render
              git remote set-url origin git@github.com:MWahhabMirzaVectorLabsFZELLC/renderNodes.git
              git fetch origin
              git reset --hard origin/main
            fi

            echo "Installing backend dependencies..."
            cd ~/render/backend/main
            npm install

            # Build only if build script exists
            if npm run | grep -q "build"; then
              npm run build
            fi

            echo "Restarting PM2..."
            if pm2 describe render-server > /dev/null 2>&1; then
              pm2 restart render-server
            else
              pm2 start npm --name render-server -- start
            fi

            pm2 save
            echo "✅ Deployment successful"
