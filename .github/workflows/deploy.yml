name: Auto Deploy Frontend & Backend to EC2 (Zero Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/render

            echo "Pulling latest changes from repo..."
            if [ ! -d ".git" ]; then
              echo "Cloning repo for the first time..."
              git clone git@github-rendernodes:MWahhabMirzaVectorLabsFZELLC/renderNodes.git .
            else
              git fetch origin
              git reset --hard origin/main
            fi

            # -------------------------
            # Backend (Main)
            # -------------------------
            echo "Installing backend dependencies..."
            cd backend/main
            npm install

            echo "Building backend..."
            if npm run | grep -q "build"; then
              npm run build
            fi

            echo "Reloading backend PM2 (zero downtime)..."
            if pm2 describe render-main-server > /dev/null 2>&1; then
              pm2 reload render-main-server
            else
              pm2 start npm --name render-main-server -- start
            fi
            pm2 save

            cd ~/render

            # -------------------------
            # Frontend
            # -------------------------
            echo "Installing frontend dependencies..."
            cd frontend
            npm install

            echo "Building frontend..."
            npm run build

            echo "Cleaning up outdated PM2 frontend dev servers (one-time fix)..."
            pm2 delete render-client || true
            pm2 save

            echo "✅ Deployment of Frontend & Backend complete (Zero Downtime)"