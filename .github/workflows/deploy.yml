name: Auto Deploy Backend to EC2

on:
  push:
    branches:
      - main  # triggers on push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # stop on first error

            echo "Navigating to render folder..."
            cd ~
            
            # Clone repo if it doesn't exist
            if [ ! -d "render/.git" ]; then
              echo "Repo not found, cloning..."
              git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/MWahhabMirzaVectorLabsFZELLC/renderNodes.git render
            fi

            cd render

            echo "Cleaning old files except backend..."
            find . -maxdepth 1 ! -name '.' ! -name 'backend' -exec rm -rf {} +

            echo "Pulling latest code from GitHub..."
            git fetch --all
            git reset --hard origin/main

            echo "Installing backend dependencies..."
            cd backend
            npm install
            npm run build

            echo "Starting or restarting PM2..."
            if pm2 describe render-server > /dev/null 2>&1; then
              pm2 restart render-server
            else
              pm2 start npm --name render-server -- run dev
            fi

            pm2 save
            echo "Deployment complete!"
