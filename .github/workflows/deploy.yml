name: Auto Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~

            if [ ! -d "render" ]; then
              echo "render not found, cloning via SSH..."
              git clone git@github.com:MWahhabMirzaVectorLabsFZELLC/renderNodes.git render
            else
              cd render

              if [ -d ".git" ]; then
                echo "Repo exists, fixing remote to SSH (just in case)..."
                git remote set-url origin git@github.com:MWahhabMirzaVectorLabsFZELLC/renderNodes.git
                git fetch origin
                git reset --hard origin/main
              else
                echo "Not a git repo, recreating folder..."
                cd ..
                rm -rf render
                git clone git@github.com:MWahhabMirzaVectorLabsFZELLC/renderNodes.git render
              fi
            fi

            cd ~/render

            echo "Installing backend dependencies..."
            cd backend
            npm install
            npm run build

            echo "Restarting PM2..."
            if pm2 describe render-server > /dev/null 2>&1; then
              pm2 restart render-server
            else
              pm2 start npm --name render-server -- run dev
            fi

            pm2 save
            echo "✅ Deployment successful"
