name: Auto Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e  # stop on first error

            echo "Navigating to home folder..."
            cd ~

            # Check if render folder exists
            if [ ! -d "render" ]; then
              echo "Folder not found, cloning repo..."
              git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/MWahhabMirzaVectorLabsFZELLC/renderNodes.git render
            else
              cd render
              # Check if it is a git repo
              if [ -d ".git" ]; then
                echo "Git repo found, pulling latest changes..."
                git fetch --all
                git reset --hard origin/main
              else
                echo "Folder exists but not a git repo. Replacing it..."
                rm -rf render
                git clone https://${{ secrets.GITHUB_TOKEN }}@github.com/MWahhabMirzaVectorLabsFZELLC/renderNodes.git render
              fi
            fi

            cd render

            echo "Cleaning old files except backend..."
            find . -maxdepth 1 ! -name '.' ! -name 'backend' -exec rm -rf {} +

            echo "Installing backend dependencies..."
            cd backend
            npm install
            npm run build

            echo "Starting or restarting PM2..."
            if pm2 describe render-server > /dev/null 2>&1; then
              pm2 restart render-server
            else
              pm2 start npm --name render-server -- run dev
            fi

            pm2 save
            echo "Deployment complete!"
