name: Auto Deploy Frontend & Newsletter to EC2 (Zero Downtime)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/render

            echo "Pulling latest changes from repo..."
            if [ ! -d ".git" ]; then
              echo "Cloning repo for the first time..."
              git clone git@github-rendernodes:MWahhabMirzaVectorLabsFZELLC/renderNodes.git .
            else
              git fetch origin
              git reset --hard origin/main
            fi

            # -------------------------
            # Backend Newsletter
            # -------------------------
            echo "Installing newsletter dependencies..."
            cd backend/newsletter
            npm install

            echo "Building newsletter..."
            if npm run | grep -q "build"; then
              npm run build
            fi

            echo "Reloading newsletter PM2 (zero downtime)..."
            if pm2 describe render-newsletter-server > /dev/null 2>&1; then
              pm2 reload render-newsletter-server
            else
              pm2 start npm --name render-newsletter-server -- start
            fi
            pm2 save

            cd ~/render

            # -------------------------
            # Frontend
            # -------------------------
            echo "Installing frontend dependencies..."
            cd frontend
            npm install

            echo "Building frontend..."
            if npm run | grep -q "build"; then
              npm run build
            fi

            echo "Reloading frontend PM2 (zero downtime)..."
            if pm2 describe render-client > /dev/null 2>&1; then
              pm2 reload render-client
            else
              pm2 start npm --name render-client -- run dev -- --host
            fi
            pm2 save

            echo "✅ Deployment of Frontend & Newsletter complete (Zero Downtime)"